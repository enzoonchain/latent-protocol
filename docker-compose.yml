version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_kickbacks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_kickbacks"]
      interval: 10s
      timeout: 5s
      retries: 5

  ad-server:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override the .env value to point at the compose db service.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/agent_kickbacks
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
